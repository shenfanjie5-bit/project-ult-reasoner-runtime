name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Existing full-suite lane preserved — runs every existing test with
  # the full extra set (dev + shared-fixtures), so legacy + regression
  # both exercise the real fixture corpus (no skip).
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@main"
      - name: Install (full)
        run: pip install -e ".[dev,shared-fixtures]"
      - name: Tests
        run: python -m pytest

  # Stage-2 plan canonical lanes (project-ult test rollout):
  # - test-fast and smoke install ONLY [dev] so they stay offline-first
  #   per SUBPROJECT_TESTING_STANDARD.md §2.2.
  # - regression separately installs [shared-fixtures] so it really
  #   consumes audit_eval_fixtures (no silent module-level skip).
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@main"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: test-fast (unit + boundary)
        run: make test-fast

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@main"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: smoke
        run: make smoke

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@main"
      - name: Install (with shared-fixtures git extra)
        run: pip install -e ".[dev,shared-fixtures]"
      - name: regression (must really consume audit_eval_fixtures)
        run: make regression
