name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@main"
      - name: Install
        run: pip install -e .
      - name: Install pytest if missing
        run: pip install pytest
      - name: Tests
        run: python -m pytest
